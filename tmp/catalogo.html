.dsf-search-form {
  display: flex;
  align-items: center;
  gap: 20px;
  margin: 24px 0 48px;
}

.dsf-search-input {
  flex: 1;
  height: 64px;                    /* ↓ menor */
  padding: 0 56px 0 22px;          /* ↓ mais compacto */
  border-radius: 48px;             /* ↓ um pouco menor */
  border: 3px solid #5C84BE;       /* ↓ mais sutil */
  background: #fff;
  outline: none;
  font-size: 20px;                 /* ↓ menor */
  color: #142B58;
  transition: border-color .2s;    /* enxuto */
}

.dsf-search-input::placeholder {
  color: #9AA7B5;
}

.dsf-search-input:focus {
  border-color: #4D75AF;
  /* box-shadow removido para ficar mais discreto */
}

.dsf-search-btn {
  height: 56px;                    /* ↓ menor */
  padding: 0 24px;                 /* ↓ mais compacto */
  border: none;
  border-radius: 40px;
  background: #A4B749;             /* cor original */
  color: #142B58;
  font-weight: 600;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .2s ease; /* enxuto */
}

.dsf-search-btn:hover {
  background: #97A93F;
}

/* Títulos (unificados) */
.dsf-search__title,
.dsf-search__new {
	font-family: Barlow;
  font-size: 24px;
  padding-top: 72px;               /* ↓ menos espaço */
  color: #142B58;
  font-weight: 600;
  text-transform: uppercase;
}

  font-size: 20px;
  color: #a5bd41;
  font-weight: 500;
  text-transform: uppercase;
}

  .dsf-search-input { height: 58px; font-size: 18px; }

  .dsf-search-btn   { height: 48px; }
}

}

}

/* Container do menu do usuário */
.dsf-user-menu {
   position: fixed !important;
    top: 18px;
    right: 25px;
    z-index: 9999999;
}

/* Ícone */
.dsf-user-icon {
  display: inline-flex;
  justify-content: center;
  align-items: center;
  width: 48px;
  height: 48px;
  border-radius: 999px;
  background: #f3f3f3;
  cursor: pointer;
}

/* Dropdown escondido por padrão */
.dsf-user-dropdown {
  position: absolute;
  top: 58px;         /* logo abaixo do ícone */
  right: 0;
  min-width: 220px;
  padding: 20px 24px;
  background: #ffffff;
  border-radius: 18px;
  box-shadow: 0 18px 45px rgba(0,0,0,0.18);
  opacity: 0;
  visibility: hidden;
  transform: translateY(8px);
  transition: opacity .18s ease, transform .18s ease, visibility .18s ease;
}

/* MOSTRAR dropdown quando o mouse estiver em QUALQUER parte do menu */
.dsf-user-menu:hover .dsf-user-dropdown {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

/* Links dentro do dropdown */
.dsf-user-dropdown a {
  display: block;
  font-size: 18px;
  line-height: 1.6;
  color: #222;
  text-decoration: none;
